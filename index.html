<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>REMNAC INVESTMENTS AG — Maintenance</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="RemnacLogo.png">
<link rel="apple-touch-icon" href="RemnacLogo.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#070d17;
    --text:#ffffff;
    --muted:#9aa8bd;
    --soft:#6f86a6;
    --accent:#6ca8ff;
    --border:rgba(255,255,255,0.06);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Inter, system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* =======================
   STICKY NAV (SWISS STYLE)
======================= */
.navbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:72px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 80px;
    background:rgba(7,13,23,0.72);
    backdrop-filter: blur(16px);
    border-bottom:1px solid var(--border);
    z-index:1000;
}

.nav-left img{
    height:75px;
    width:auto;
    display:block;
}

/* ICON BUTTONS */
.nav-right{
    display:flex;
    align-items:center;
    gap:10px;
}

.icon-btn{
    width:36px;
    height:36px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.02);
    backdrop-filter: blur(10px);
    transition:all 0.2s ease;
    text-decoration:none;
}

.icon-btn img{
    width:16px;
    height:16px;
    object-fit:contain;
    opacity:0.85;
    transition:all 0.2s ease;
}

.icon-btn:hover{
    border-color:rgba(108,168,255,0.45);
    background:rgba(108,168,255,0.08);
    transform:translateY(-1px);
}

.icon-btn:hover img{
    opacity:1;
}

/* PAGE */
.page{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:140px 80px 72px;
    position:relative;
}

/* BACKGROUND */
.page::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 80% 20%, rgba(108,168,255,0.12), transparent 45%),
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.04), transparent 40%);
    pointer-events:none;
}

.container{
    display:grid;
    grid-template-columns: 1.15fr 0.85fr;
    gap:96px;
    align-items:center;
    z-index:2;
}

/* TYPOGRAPHY */
h1{
    font-size:64px;
    line-height:1.05;
    font-weight:300;
    letter-spacing:-0.02em;
    margin-bottom:24px;
}

.highlight{
    color:var(--accent);
}

.description{
    font-size:17px;
    line-height:1.75;
    color:var(--muted);
    max-width:560px;
    margin-bottom:36px;
}

/* STATUS */
.status-box{
    border:1px solid var(--border);
    background:rgba(255,255,255,0.02);
    backdrop-filter: blur(14px);
    border-radius:16px;
    padding:22px 24px;
    max-width:460px;
}

.status-title{
    font-size:12px;
    letter-spacing:2.4px;
    text-transform:uppercase;
    color:var(--soft);
    margin-bottom:14px;
}

.status-line{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:15px;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 14px rgba(108,168,255,0.7);
}

/* CARD */
.right{
    display:flex;
    justify-content:center;
}

.card{
    width:100%;
    max-width:620px;
    background:linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border:1px solid var(--border);
    border-radius:22px;
    padding:28px;
}

.card img{
    width:100%;
    border-radius:14px;
    display:block;
    opacity:0.95;
}

/* FOOTER */
.footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    color:var(--soft);
    letter-spacing:1.2px;
    z-index:2;
}

.footer-right{
    display:flex;
    gap:18px;
}

/* RESPONSIVE */
@media(max-width:1024px){
    .navbar{
        padding:0 24px;
    }

    .container{
        grid-template-columns:1fr;
        gap:48px;
    }

    h1{
        font-size:46px;
    }

    .page{
        padding:120px 24px 60px;
    }

    .footer{
        flex-direction:column;
        gap:14px;
        text-align:center;
    }
}
</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">

    <div class="nav-left">
        <img src="RemnacLogo.png" alt="REMNAC INVESTMENTS AG">
    </div>

    <div class="nav-right">

        <a href="mailto:info@remnacag.vc" class="icon-btn" title="Email">
            <img src="email.png" alt="Email">
        </a>

        <a href="https://wa.link/jf8nbd" class="icon-btn" title="WhatsApp">
            <img src="R.png" alt="WhatsApp">
        </a>

        <a href="https://www.linkedin.com/company/remnac-investments-ag" class="icon-btn" title="LinkedIn">
            <img src="linkedin.png" alt="LinkedIn">
        </a>

    </div>

</div>

<!-- ================= PAGE ================= -->
<div class="page">

    <div class="container">

        <div class="left">

            <h1>
                We Are Currently Updating <span class="highlight">And Upgrading Our Website</span>
            </h1>

            <p class="description">
                Full Service will be restored shortly.
            </p>

            <div class="status-box">

                <div class="status-title">System Status</div>

                <div class="status-line">
                    <span class="dot"></span>
                    Maintenance & System Upgrade in Progress
                </div>

            </div>

        </div>

        <div class="right">

            <div class="card">
                <img src="1000007728.png" alt="Maintenance Visual">
            </div>

        </div>

    </div>

    <div class="footer">

        <div>Copyright © 2026 by REMNAC INVESTMENTS AG</div>

        </div>

    </div>

</div>

</body>
</html>
