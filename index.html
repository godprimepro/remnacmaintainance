<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>REMNAC INVESTMENTS AG — Maintenance</title>

<!-- TEMP FONT (replace once exact remnac font is confirmed) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#070d17;
    --panel:#0b1626;
    --text:#ffffff;
    --muted:#9aa8bd;
    --soft:#6f86a6;
    --accent:#6ca8ff;
    --border:rgba(255,255,255,0.06);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Inter, system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* MAIN LAYOUT */
.page{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:72px 80px;
    position:relative;
}

/* SUBTLE GRID / LIGHT EFFECT */
.page::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 80% 20%, rgba(108,168,255,0.12), transparent 45%),
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.04), transparent 40%);
    pointer-events:none;
}

/* HEADER GRID */
.container{
    display:grid;
    grid-template-columns: 1.15fr 0.85fr;
    gap:96px;
    align-items:center;
    z-index:2;
}

/* LOGO */
.logo{
    margin-bottom:32px;
}

.logo img{
    height:22px; /* adjust to match remnac exact scale */
    width:auto;
    display:block;
}

/* TYPOGRAPHY */
h1{
    font-size:64px;
    line-height:1.05;
    font-weight:300;
    letter-spacing:-0.02em;
    margin-bottom:24px;
}

.highlight{
    color:var(--accent);
}

.description{
    font-size:17px;
    line-height:1.75;
    color:var(--muted);
    max-width:560px;
    margin-bottom:36px;
}

/* STATUS CARD */
.status-box{
    border:1px solid var(--border);
    background:rgba(255,255,255,0.02);
    backdrop-filter: blur(14px);
    border-radius:16px;
    padding:22px 24px;
    max-width:460px;
}

.status-title{
    font-size:12px;
    letter-spacing:2.4px;
    text-transform:uppercase;
    color:var(--soft);
    margin-bottom:14px;
}

.status-line{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:15px;
    color:var(--text);
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 14px rgba(108,168,255,0.7);
}

/* RIGHT VISUAL */
.right{
    display:flex;
    justify-content:center;
}

.card{
    width:100%;
    max-width:620px;
    background:linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border:1px solid var(--border);
    border-radius:22px;
    padding:28px;
}

/* IMAGE */
.card img{
    width:100%;
    border-radius:14px;
    display:block;
    opacity:0.95;
}

/* FOOTER */
.footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    color:var(--soft);
    letter-spacing:1.2px;
    z-index:2;
}

.footer-right{
    display:flex;
    gap:26px;
}

/* RESPONSIVE */
@media(max-width:1024px){
    .container{
        grid-template-columns:1fr;
        gap:48px;
    }

    h1{
        font-size:46px;
    }

    .page{
        padding:48px 24px;
    }

    .footer{
        flex-direction:column;
        gap:10px;
        text-align:center;
    }
}
</style>
</head>

<body>

<div class="page">

    <div class="container">

        <div class="left">

            <div class="logo">
              <img src="RemnacLogo.png" alt="REMNAC INVESTMENTS AG">
            </div>

            <h1>
                We Are Currently Carrying Out <span class="highlight">Website Maintenance</span>
            </h1>

            <p class="description">
                The site will be restored shortly.
            </p>

            <div class="status-box">

                <div class="status-title">System Status</div>

                <div class="status-line">
                    <span class="dot"></span>
                    Maintenance & System Upgrade in Progress
                </div>

            </div>

        </div>

        <div class="right">

            <div class="card">
                <img src="1000007728.png" alt="Maintenance Visual">
            </div>

        </div>

    </div>

    <div class="footer">

        <div>© REMNAC INVESTMENTS AG</div>

        <div class="footer-right">
            <span>Strategic Capital</span>
            <span>Private Investments</span>
            <span>Switzerland</span>
        </div>

    </div>

</div>

</body>
</html>
